name: release

# bumpp 打出 vX.Y.Z tag 并推送后触发：交叉编译 hce 五平台 + 发 GitHub Release。
# hce 是纯 Go 客户端（无 CGO），可在 ubuntu 上交叉编译所有平台。
on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # 需要完整历史 + tag 才能算出两个版本间的 commit 范围

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: 交叉编译（版本号经 ldflags 注入）
        env:
          CGO_ENABLED: '0'
          VERSION: ${{ github.ref_name }}
        run: |
          mkdir -p dist
          platforms="darwin/amd64 darwin/arm64 linux/amd64 linux/arm64 windows/amd64"
          for p in $platforms; do
            os=${p%/*}; arch=${p#*/}
            out=hce
            [ "$os" = windows ] && out=hce.exe
            echo ">> $os/$arch"
            GOOS=$os GOARCH=$arch go build -trimpath \
              -ldflags "-s -w -X main.version=${VERSION}" \
              -o "dist/$out" ./cmd/hce
            base="hce_${VERSION}_${os}_${arch}"
            if [ "$os" = windows ]; then
              (cd dist && zip -q "${base}.zip" "$out" && rm "$out")
            else
              (cd dist && tar czf "${base}.tar.gz" "$out" && rm "$out")
            fi
          done
          (cd dist && sha256sum * > checksums.txt)
          ls -lh dist

      - name: 生成 changelog（按 Conventional Commits 分组）
        env:
          VERSION: ${{ github.ref_name }}
          REPO: ${{ github.repository }}
        run: |
          # 取当前 tag 的上一个 tag；首个 release 则 prev 为空，统计全部历史
          prev=$(git describe --tags --abbrev=0 "${VERSION}^" 2>/dev/null || true)
          [ -n "$prev" ] && range="${prev}..${VERSION}" || range=""
          echo "范围: ${range:-（首个 release，全部历史）}"

          rm -rf /tmp/cl && mkdir -p /tmp/cl
          # 把每条 commit 按类型分桶（feat/fix/perf/refactor/docs/其他）
          git log --no-merges --reverse --pretty=format:'%s|%h' $range | \
          while IFS='|' read -r subj hash; do
            type=$(printf '%s' "$subj" | sed -nE 's/^([a-z]+)(\(.*\))?!?:.*/\1/p')
            case "$type" in
              feat) bucket=feat ;;
              fix) bucket=fix ;;
              perf) bucket=perf ;;
              refactor) bucket=refactor ;;
              docs) bucket=docs ;;
              *)
                # 跳过 bumpp 打的版本号提交，避免噪音
                case "$subj" in chore:\ release*|chore\(release\)*|"release "*) continue ;; esac
                bucket=other ;;
            esac
            scope=$(printf '%s' "$subj" | sed -nE 's/^[a-z]+\(([^)]+)\).*/\1/p')
            desc=$(printf '%s' "$subj" | sed -E 's/^[a-z]+(\([^)]*\))?!?:[[:space:]]*//')
            [ -n "$scope" ] && echo "- **${scope}**: ${desc} (${hash})" >> "/tmp/cl/$bucket" \
                            || echo "- ${desc} (${hash})" >> "/tmp/cl/$bucket"
          done

          {
            add() { [ -s "/tmp/cl/$1" ] && { printf '### %s\n\n' "$2"; cat "/tmp/cl/$1"; printf '\n'; }; return 0; }  # 空分组返回 0，避免 bash -e 下退出
            add feat '🚀 Features'
            add fix '🐛 Bug Fixes'
            add perf '⚡ Performance'
            add refactor '♻️ Refactoring'
            add docs '📝 Documentation'
            add other '🔧 Other Changes'
            if [ -n "$prev" ]; then
              printf '**Full Changelog**: https://github.com/%s/compare/%s...%s\n' "$REPO" "$prev" "$VERSION"
            else
              printf '**Full Changelog**: https://github.com/%s/commits/%s\n' "$REPO" "$VERSION"
            fi
          } > /tmp/RELEASE_NOTES.md

          echo "----- 生成的 release notes -----"
          cat /tmp/RELEASE_NOTES.md

      - name: 发布 Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          body_path: /tmp/RELEASE_NOTES.md
