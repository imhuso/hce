name: release

# bumpp 打出 vX.Y.Z tag 并推送后触发：交叉编译 hce-cli 五平台 + 发 GitHub Release。
# hce-cli 是纯 Go 客户端（无 CGO），可在 ubuntu 上交叉编译所有平台。
on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: 交叉编译（版本号经 ldflags 注入）
        env:
          CGO_ENABLED: '0'
          VERSION: ${{ github.ref_name }}
        run: |
          mkdir -p dist
          platforms="darwin/amd64 darwin/arm64 linux/amd64 linux/arm64 windows/amd64"
          for p in $platforms; do
            os=${p%/*}; arch=${p#*/}
            out=hce-cli
            [ "$os" = windows ] && out=hce-cli.exe
            echo ">> $os/$arch"
            GOOS=$os GOARCH=$arch go build -trimpath \
              -ldflags "-s -w -X main.version=${VERSION}" \
              -o "dist/$out" ./cmd/hce-cli
            base="hce-cli_${VERSION}_${os}_${arch}"
            if [ "$os" = windows ]; then
              (cd dist && zip -q "${base}.zip" "$out" && rm "$out")
            else
              (cd dist && tar czf "${base}.tar.gz" "$out" && rm "$out")
            fi
          done
          (cd dist && sha256sum * > checksums.txt)
          ls -lh dist

      - name: 发布 Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
