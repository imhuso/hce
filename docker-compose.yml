services:
  # Milvus 依赖: etcd
  etcd:
    container_name: hce-etcd
    image: quay.io/coreos/etcd:v3.5.18
    environment:
      - ETCD_AUTO_COMPACTION_MODE=revision
      - ETCD_AUTO_COMPACTION_RETENTION=1000
      - ETCD_QUOTA_BACKEND_BYTES=4294967296
      - ETCD_SNAPSHOT_COUNT=50000
    volumes:
      - etcd_data:/etcd
    command: etcd -advertise-client-urls=http://127.0.0.1:2379 -listen-client-urls http://0.0.0.0:2379 --data-dir /etcd
    healthcheck:
      test: ["CMD", "etcdctl", "endpoint", "health"]
      interval: 30s
      timeout: 20s
      retries: 3
    restart: unless-stopped

  # Milvus 依赖: MinIO（对象存储）
  minio:
    container_name: hce-minio
    image: minio/minio:RELEASE.2025-04-22T22-12-26Z
    environment:
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
    # 仅在 compose 内网可见；如需要本地访问控制台再临时打开
    expose:
      - "9001"
    volumes:
      - minio_data:/minio_data
    command: minio server /minio_data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3
    restart: unless-stopped

  # Milvus 向量数据库
  milvus:
    container_name: hce-milvus
    image: milvusdb/milvus:v2.4.0
    command: ["milvus", "run", "standalone"]
    security_opt:
      - seccomp:unconfined
    environment:
      ETCD_ENDPOINTS: etcd:2379
      MINIO_ADDRESS: minio:9000
    # 仅在 compose 内网暴露；后端容器通过 milvus:19530 直连
    expose:
      - "19530"
      - "9091"
    volumes:
      - milvus_data:/var/lib/milvus
    depends_on:
      etcd:
        condition: service_healthy
      minio:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9091/healthz"]
      interval: 30s
      timeout: 20s
      retries: 3
    restart: unless-stopped

  # HCE 后端
  hce-server:
    container_name: hce-server
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      # 全部敏感配置通过环境变量注入；不写入镜像和 git
      MILVUS_ADDRESS: "milvus:19530"
      HCE_EMBEDDING_PROVIDER: "${HCE_EMBEDDING_PROVIDER:-gemini}"
      HCE_EMBEDDING_MODEL: "${HCE_EMBEDDING_MODEL:-gemini-embedding-001}"
      HCE_EMBEDDING_API_KEY: "${HCE_EMBEDDING_API_KEY:-}"
      HCE_EMBEDDING_BASE_URL: "${HCE_EMBEDDING_BASE_URL:-}"
      HCE_EMBEDDING_DIM: "${HCE_EMBEDDING_DIM:-}"
    volumes:
      # 配置目录（只读挂载，运行时不会被改）
      - ./configs:/app/configs:ro
    # 不对外暴露后端端口；前端容器通过内网 hce-server:9527 反代访问
    expose:
      - "9527"
    # 让容器内能访问宿主机（用于 LM Studio / Ollama 本地 embedding）
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      milvus:
        condition: service_healthy
    restart: unless-stopped

  # HCE 前端（nginx + 反代到后端）
  hce-web:
    container_name: hce-web
    build:
      context: ./web
      dockerfile: Dockerfile
    ports:
      - "9528:80"
    depends_on:
      - hce-server
    restart: unless-stopped

volumes:
  etcd_data:
  minio_data:
  milvus_data:
